<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CAP Theorem Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f4f7fb}
.hero{background:linear-gradient(135deg,#1e3a8a,#2563eb);color:white;padding:25px;border-radius:15px}
.card{border:none;border-radius:15px}
</style>
</head>
<body>
<div class="container py-4">
<div class="hero mb-4">
<h1>CAP Theorem Minimarket Dashboard</h1>
<p>Simulasi AP dan CP pada Antrian Minimarket</p>
</div>

<div class="row g-3">
<div class="col-md-3"><div class="card shadow-sm"><div class="card-body"><h6>Stok</h6><h2 id="stok">10</h2></div></div></div>
<div class="col-md-3"><div class="card shadow-sm"><div class="card-body"><h6>Mode</h6><h2 id="mode">AP</h2></div></div></div>
<div class="col-md-3"><div class="card shadow-sm"><div class="card-body"><h6>Jaringan</h6><h2 id="status">ONLINE</h2></div></div></div>
<div class="col-md-3"><div class="card shadow-sm"><div class="card-body"><h6>Transaksi</h6><h2 id="trx">0</h2></div></div></div>
</div>

<div class="card shadow-sm mt-4">
<div class="card-body">
<button class="btn btn-primary" onclick="beli('Kasir 1')">Kasir 1</button>
<button class="btn btn-success" onclick="beli('Kasir 2')" id="k2">Kasir 2</button>
<button class="btn btn-warning" onclick="toggleNet()">Putus/Sambung Jaringan</button>
<button class="btn btn-info" onclick="setMode('AP')">Mode AP</button>
<button class="btn btn-danger" onclick="setMode('CP')">Mode CP</button>
<button class="btn btn-secondary" onclick="location.reload()">Reset</button>
</div>
</div>

<div class="card shadow-sm mt-4">
<div class="card-header">Log Transaksi</div>
<div class="card-body">
<ul id="log"></ul>
</div>
</div>
</div>

<script>
let stok=10,trx=0,online=true,mode='AP';
function update(){
document.getElementById('stok').innerText=stok;
document.getElementById('trx').innerText=trx;
document.getElementById('mode').innerText=mode;
document.getElementById('status').innerText=online?'ONLINE':'OFFLINE';
document.getElementById('k2').disabled=(mode==='CP' && !online);
}
function log(t){document.getElementById('log').innerHTML+='<li>'+t+'</li>';}
function beli(k){if(stok>0){stok--;trx++;log(k+' menjual 1 Indomie');update();}}
function toggleNet(){online=!online;log('Jaringan '+(online?'ONLINE':'OFFLINE'));update();}
function setMode(m){mode=m;log('Mode '+m+' aktif');update();}
update();
</script>
</body>
</html>
