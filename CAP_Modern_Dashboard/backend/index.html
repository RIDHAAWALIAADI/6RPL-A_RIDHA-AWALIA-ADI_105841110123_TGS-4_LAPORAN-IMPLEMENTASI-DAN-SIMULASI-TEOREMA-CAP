<!DOCTYPE html>
<html>
<head>

<title>CAP Dashboard</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="sidebar">

<h2>CAP Dashboard</h2>

<button>Dashboard</button>
<button>Monitoring</button>
<button>Database</button>

</div>

<div class="main">

<div class="topbar">
<h1>Minimarket Monitoring System</h1>
</div>

<div class="cards">

<div class="card">
<h3>Stok</h3>
<h1 id="stok">0</h1>
</div>

<div class="card">
<h3>Transaksi</h3>
<h1 id="trx">0</h1>
</div>

<div class="card">
<h3>Mode</h3>
<h1 id="mode">AP</h1>
</div>

<div class="card">
<h3>Network</h3>
<h1 id="network">ONLINE</h1>
</div>

</div>

<div class="chart-container">
<canvas id="grafik"></canvas>
</div>

<button class="buy-btn" onclick="beli()">
Simulasi Pembelian
</button>

</div>

<script src="app.js"></script>

</body>
</html>
